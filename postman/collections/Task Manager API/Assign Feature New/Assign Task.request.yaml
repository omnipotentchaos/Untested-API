$kind: http-request
name: Assign Task
method: PATCH
url: '{{baseUrl}}/tasks/{{assignTaskId}}/assign'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "assignee": "john.doe"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Task is assigned correctly", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.assignee).to.eql("john.doe");
      });
